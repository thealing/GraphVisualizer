<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
		<title>Graph Visualizer</title>
	<link rel="stylesheet" href="index.css">
</head>
<body>
	<div id="header">Graph Visualizer</div>
	<div id="layout">
		<div id="content">
			<svg id="display-svg"></svg>
		</div>
		<div id="toolbar-container">
			<div id="toolbar">
				<div class="input-container">
					<label id="node-size-label">Node Size</label>
					<input id="node-size-input" type="number" value="25" />
					<label id="node-margin-label">Node Margin</label>
					<input id="node-margin-input" type="number" value="40" />
					<label id="distance-label">Edge Length</label>
					<input id="distance-input" type="number" value="180" />
					<label id="directed-label">Directed Edges</label>
					<input id="directed-input" type="checkbox" checked />
					<label id="weighted-label">Weighted Edges</label>
					<input id="weighted-input" type="checkbox" checked />
				</div>
				<div class="separator"></div>
				<textarea id="edge-list-edit" placeholder="Edge list goes here"></textarea>
				<button onclick="onUpdate()">Update</button>
				<button onclick="onRefresh()">Refresh</button>
				<div class="separator"></div>
				<div class="input-container">
					<label id="speed-label">Simulation Speed</label>
					<input id="speed-input" type="number" value="1" step="0.1" />
					<label id="manual-label">Manual Mode</label>
					<input id="manual-input" type="checkbox" />
				</div>
				<div class="separator"></div>
				<label id="example-label">Random Example</label>
				<div class="input-container">
					<label id="example-count-label">Node Count</label>
					<input id="example-count-input" type="number" value="16" step="4" />
					<label id="example-type-label">Graph Type</label>
					<select id="example-type-input">
						<option value="any">Any</option>
						<option value="planar">Planar</option>
						<option value="tree">Tree</option>
					</select>
				</div>
				<button onclick="onRandom()">Generate</button>
			</div>
		</div>
	</div>
	<script src="index.js"></script>
</body>
</html>
